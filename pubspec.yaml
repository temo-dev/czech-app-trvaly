name: app_czech
description: Vietnamese-first Czech Trvalý exam prep app.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State management ────────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navigation ───────────────────────────────────────────────────────────────
  go_router: ^14.2.0

  # ── Backend / Auth ───────────────────────────────────────────────────────────
  supabase_flutter: ^2.5.0

  # ── Offline storage ──────────────────────────────────────────────────────────
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  hive_flutter: ^1.1.0

  # ── Data models ──────────────────────────────────────────────────────────────
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # ── Audio recording + playback ───────────────────────────────────────────────
  record: ^5.2.1
  just_audio: ^0.9.40

  # ── File paths (required by record for native audio) ─────────────────────────
  path_provider: ^2.1.4

  # ── Connectivity ─────────────────────────────────────────────────────────────
  connectivity_plus: ^6.1.4

  # ── UI utilities ─────────────────────────────────────────────────────────────
  shimmer: ^3.0.0
  gap: ^3.0.1

  # ── Internationalisation ─────────────────────────────────────────────────────
  intl: ^0.19.0

  # ── General utilities ────────────────────────────────────────────────────────
  equatable: ^2.0.5
  uuid: ^4.4.0
  url_launcher: ^6.3.0

dependency_overrides:
  record_linux: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  custom_lint: ^0.6.4

  # Testing
  mocktail: ^1.0.4
  fake_async: ^1.3.1
  network_image_mock: ^2.1.1

  # Code generation
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  generate: true      # enables AppLocalizations from l10n.yaml

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

  fonts:
    # Sahara design system — Headline serif
    - family: EBGaramond
      fonts:
        - asset: assets/fonts/EB_Garamond/static/EBGaramond-Regular.ttf
          weight: 400
        - asset: assets/fonts/EB_Garamond/static/EBGaramond-Medium.ttf
          weight: 500
        - asset: assets/fonts/EB_Garamond/static/EBGaramond-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/EB_Garamond/static/EBGaramond-Bold.ttf
          weight: 700
        - asset: assets/fonts/EB_Garamond/static/EBGaramond-Italic.ttf
          weight: 400
          style: italic

    # Sahara design system — Body / Label sans-serif
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope/static/Manrope-Regular.ttf
          weight: 400
        - asset: assets/fonts/Manrope/static/Manrope-Medium.ttf
          weight: 500
        - asset: assets/fonts/Manrope/static/Manrope-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Manrope/static/Manrope-Bold.ttf
          weight: 700
