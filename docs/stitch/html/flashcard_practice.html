<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Luyện từ vựng - Trvalý Exam</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&amp;family=Manrope:wght@200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-highest": "#e6e0d6",
                        "secondary-container": "#eae2da",
                        "on-secondary-container": "#605850",
                        "tertiary-container": "#d47070",
                        "surface-bright": "#faf5ee",
                        "on-background": "#3a302a",
                        "secondary-fixed-dim": "#cec6be",
                        "on-secondary-fixed-variant": "#504840",
                        "on-error-container": "#7a1a10",
                        "surface-container-low": "#f6f0e8",
                        "surface-tint": "#c2652a",
                        "background": "#faf5ee",
                        "outline-variant": "#d8d0c8",
                        "surface-variant": "#ece6dc",
                        "on-tertiary-container": "#3a2020",
                        "on-surface-variant": "#605850",
                        "outline": "#9a9088",
                        "surface-container-lowest": "#ffffff",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#e8a0a0",
                        "on-error": "#ffffff",
                        "on-tertiary-fixed-variant": "#6e3030",
                        "secondary-fixed": "#eae2da",
                        "tertiary": "#8c3c3c",
                        "on-secondary-fixed": "#2a2420",
                        "on-surface": "#3a302a",
                        "inverse-primary": "#f0a878",
                        "surface-container-high": "#ece6dc",
                        "surface": "#faf5ee",
                        "error": "#c0392b",
                        "error-container": "#fce4e0",
                        "tertiary-fixed": "#fce0e0",
                        "on-primary-fixed": "#401a08",
                        "primary-container": "#e08850",
                        "on-primary-container": "#fbe8d8",
                        "primary": "#c2652a",
                        "on-tertiary-fixed": "#2e1515",
                        "inverse-on-surface": "#faf5ee",
                        "inverse-surface": "#3a302a",
                        "on-secondary": "#ffffff",
                        "primary-fixed-dim": "#f0a878",
                        "surface-container": "#f2ece4",
                        "on-tertiary": "#ffffff",
                        "secondary": "#78706a",
                        "surface-dim": "#dcd6cc",
                        "primary-fixed": "#fbe8d8",
                        "on-primary-fixed-variant": "#8a4518"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["EB Garamond", "serif"],
                        "body": ["Manrope", "sans-serif"],
                        "label": ["Manrope", "sans-serif"]
                    }
                },
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #faf5ee;
        }
        .font-serif {
            font-family: 'EB Garamond', serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-[#faf5ee] dark:bg-stone-950 flex justify-between items-center w-full px-6 h-16 docked full-width top-0 border-b border-[#d8d0c8]/60 dark:border-stone-800 shadow-sm dark:shadow-none z-50">
<div class="flex items-center gap-4">
<button class="text-[#c2652a] dark:text-orange-400 hover:bg-[#c2652a]/5 dark:hover:bg-orange-400/5 transition-colors p-2 rounded-full active:opacity-80 active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-serif text-2xl tracking-tight text-[#c2652a] dark:text-orange-400 font-semibold">Luyện từ vựng</h1>
</div>
<button class="text-stone-500 dark:text-stone-400 hover:bg-[#c2652a]/5 dark:hover:bg-orange-400/5 transition-colors p-2 rounded-full active:opacity-80 active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</header>
<!-- Progress Indicator -->
<div class="w-full h-1 bg-surface-container">
<div class="h-full bg-primary" style="width: 30%"></div>
</div>
<div class="px-6 py-2 flex justify-between items-center">
<span class="text-xs font-label text-secondary uppercase tracking-widest">Tiến độ hôm nay</span>
<span class="text-xs font-label font-bold text-primary">12 / 40 từ</span>
</div>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col items-center justify-center p-6 gap-8 overflow-y-auto pb-32">
<!-- Flashcard Container -->
<div class="w-full max-w-md perspective-1000">
<div class="bg-surface-container-lowest rounded-lg shadow-[0_2px_16px_rgba(58,48,42,0.04)] border border-outline-variant/60 overflow-hidden relative">
<!-- Card Actions -->
<div class="absolute top-6 right-6 z-10">
<button class="flex items-center justify-center w-10 h-10 rounded-full text-secondary hover:text-primary hover:bg-primary/5 transition-colors">
<span class="material-symbols-outlined" data-icon="bookmark">bookmark</span>
</button>
</div>
<!-- Front Side Content -->
<div class="p-8 pt-12 text-center border-b border-outline-variant/30">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-primary/10 text-primary mb-6 cursor-pointer hover:scale-105 transition-transform">
<span class="material-symbols-outlined" data-icon="volume_up">volume_up</span>
</div>
<h2 class="font-serif text-5xl text-on-background mb-4 font-medium tracking-tight">Potraviny</h2>
<p class="text-xs font-label uppercase tracking-widest text-outline">Czech (Tiếng Séc)</p>
</div>
<!-- Back Side Content (Visible State) -->
<div class="p-8 bg-surface-container-low/40">
<div class="mb-8">
<h3 class="text-2xl font-serif text-primary mb-2">Thực phẩm, đồ ăn</h3>
<p class="text-xs font-label uppercase tracking-widest text-outline">Vietnamese (Tiếng Việt)</p>
</div>
<div class="space-y-4 text-left p-6 bg-surface-container rounded-xl border border-outline-variant/20">
<div class="flex justify-between items-start gap-4">
<p class="font-medium text-on-background leading-relaxed">Musíme nakoupit čerstvé <span class="text-primary font-bold">potraviny</span> na víkend.</p>
<button class="text-secondary hover:text-primary transition-colors">
<span class="material-symbols-outlined text-xl" data-icon="volume_up">volume_up</span>
</button>
</div>
<p class="text-secondary italic text-sm border-t border-outline-variant/30 pt-3">Chúng ta cần mua thực phẩm tươi sống cho cuối tuần.</p>
</div>
<div class="mt-8 flex items-center justify-center gap-2 text-outline text-xs">
<span class="material-symbols-outlined text-sm" data-icon="touch_app">touch_app</span>
<span class="font-label">Chạm để xem chi tiết ngữ pháp</span>
</div>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full max-w-md flex flex-col gap-4 px-4">
<button class="w-full bg-primary text-on-primary font-body py-4 rounded-lg text-lg font-bold shadow-sm hover:opacity-90 active:scale-95 transition-all">
                Câu tiếp theo
            </button>
<button class="w-full text-secondary font-body py-2 hover:text-primary transition-colors text-sm uppercase tracking-widest font-semibold flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="done_all">done_all</span>
                Đã thuộc từ này
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 py-3 pb-safe bg-[#faf5ee]/90 dark:bg-stone-950/90 backdrop-blur-md border-t border-[#d8d0c8]/60 dark:border-stone-800">
<button class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 p-2 hover:text-[#c2652a] dark:hover:text-orange-400">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-sans text-[10px] font-medium uppercase tracking-widest mt-1">Trang chủ</span>
</button>
<button class="flex flex-col items-center justify-center bg-[#c2652a]/10 dark:bg-orange-400/10 text-[#c2652a] dark:text-orange-400 rounded-xl p-2 scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="style" style="font-variation-settings: 'FILL' 1;">style</span>
<span class="font-sans text-[10px] font-medium uppercase tracking-widest mt-1">Luyện tập</span>
</button>
<button class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 p-2 hover:text-[#c2652a] dark:hover:text-orange-400">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
<span class="font-sans text-[10px] font-medium uppercase tracking-widest mt-1">Tiến độ</span>
</button>
<button class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 p-2 hover:text-[#c2652a] dark:hover:text-orange-400">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-sans text-[10px] font-medium uppercase tracking-widest mt-1">Hồ sơ</span>
</button>
</nav>
</body></html>
