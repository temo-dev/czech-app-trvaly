<!DOCTYPE html>

<html class="light" lang="vi"><head>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                  "body": ["Manrope", "sans-serif"],
                  "label": ["Manrope", "sans-serif"]

<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #d8d0c8;
      border-radius: 10px;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-6 h-16 sticky top-0 z-50 bg-[#faf5ee] dark:bg-stone-950 border-b border-[#d8d0c8]/60 dark:border-stone-800 shadow-sm shadow-stone-900/5">
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-stone-100 dark:hover:bg-stone-900 transition-colors active:scale-95 transition-transform text-[#c2652a] dark:text-orange-400">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-headline text-2xl tracking-tight text-[#c2652a] dark:text-orange-400 font-bold">Luyện nghe</h1>
</div>
<button class="p-2 rounded-full hover:bg-stone-100 dark:hover:bg-stone-900 transition-colors active:scale-95 transition-transform text-[#c2652a] dark:text-orange-400">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</header>
<main class="flex-1 flex flex-col max-w-2xl mx-auto w-full px-6 py-8 pb-32">
<!-- Progress Indicator -->
<div class="mb-10">
<div class="flex justify-between items-end mb-2">
<span class="text-xs font-bold font-label tracking-widest text-secondary uppercase">Tiến độ</span>
<span class="font-headline text-xl text-primary font-bold">5 / 15</span>
</div>
<div class="w-full bg-surface-container-high h-1.5 rounded-full overflow-hidden">
<div class="bg-primary h-full w-1/3 rounded-full transition-all duration-500"></div>
</div>
</div>
<!-- Audio Player Section -->
<section class="mb-10">
<div class="bg-surface-container-low rounded-3xl p-8 shadow-[0_2px_16px_rgba(58,48,42,0.04)] border border-outline-variant/30">
<div class="flex flex-col items-center gap-6">
<!-- Album Art / Placeholder -->
<div class="w-48 h-48 rounded-2xl overflow-hidden bg-surface-container-highest shadow-inner flex items-center justify-center relative group">
<img alt="Listening exercise visual" class="w-full h-full object-cover opacity-80 group-hover:scale-105 transition-transform duration-700" data-alt="warm sunbeams hitting a wooden desk with vintage headphones and a cup of coffee in a minimalist setting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCYUG6aYKRHEFxqdr5c2KCHALnkhvVrdR8tkhdHY2Lux1F4TaEQnZpOa5c6RpSqQFiwbiFkkDUkvTnB_Y2koowoBKRxBJKmfdIR5wjraYI7Gr_DGhnleN580v4oY_sB_8fQkztnDhR-xRBpLoQNsJEsRoO_basaR7Gw-xOF2_U_YAQ6lrAmpWXTmjKnBQU6WF5sQtR9CPQjl2uKIqLWCklJ6fffaZMTlzRgnviJy2CjuOv9aEHUrTbiuzZtQ06WbNVNs9sl1kYK3PM"/>
<div class="absolute inset-0 bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-5xl opacity-40" data-icon="volume_up">volume_up</span>
</div>
</div>
<!-- Controls -->
<div class="w-full space-y-4">
<div class="flex items-center justify-between gap-4">
<span class="text-xs font-semibold font-label text-secondary tabular-nums">0:42</span>
<div class="flex-1 h-1.5 bg-surface-container-high rounded-full relative group cursor-pointer">
<div class="absolute left-0 top-0 h-full w-[40%] bg-primary rounded-full"></div>
<div class="absolute left-[40%] top-1/2 -translate-y-1/2 w-4 h-4 bg-primary border-2 border-surface shadow-md rounded-full transition-transform group-hover:scale-125"></div>
</div>
<span class="text-xs font-semibold font-label text-secondary tabular-nums">1:55</span>
</div>
<div class="flex items-center justify-center gap-8">
<button class="text-secondary hover:text-primary transition-colors">
<span class="material-symbols-outlined text-3xl" data-icon="replay_10">replay_10</span>
</button>
<button class="w-16 h-16 rounded-full bg-primary text-on-primary flex items-center justify-center shadow-lg shadow-primary/20 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-4xl" data-icon="play_arrow" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
<button class="text-secondary hover:text-primary transition-colors">
<span class="material-symbols-outlined text-3xl" data-icon="forward_10">forward_10</span>
</button>
</div>
</div>
</div>
</div>
<!-- Replay Rule -->
<div class="mt-4 flex items-center justify-center gap-2 text-secondary">
<span class="material-symbols-outlined text-sm" data-icon="info">info</span>
<p class="text-sm font-medium italic">Bạn được nghe tối đa 2 lần</p>
</div>
</section>
<!-- Transcript Button -->
<div class="mb-10 flex justify-center">
<button class="flex items-center gap-2 px-6 py-2.5 rounded-full border border-outline-variant text-secondary font-label text-sm hover:bg-surface-container transition-colors active:scale-95">
<span class="material-symbols-outlined text-lg" data-icon="description">description</span>
<span>Xem bản dịch</span>
<span class="material-symbols-outlined text-lg" data-icon="expand_more">expand_more</span>
</button>
</div>
<!-- Question Section -->
<section class="space-y-6">
<div class="space-y-3">
<span class="text-xs font-bold font-label tracking-[0.2em] text-tertiary uppercase">Câu hỏi 5</span>
<h2 class="font-headline text-2xl md:text-3xl font-semibold leading-tight text-on-surface">
          Dựa vào đoạn hội thoại, tại sao Peter lại đến muộn?
        </h2>
</div>
<div class="grid grid-cols-1 gap-4">
<!-- Option A -->
<button class="group flex items-center gap-4 p-5 rounded-2xl bg-surface-container-lowest border border-outline-variant/40 text-left hover:border-primary/50 hover:bg-primary-fixed/30 transition-all active:scale-[0.98]">
<span class="w-10 h-10 flex-shrink-0 flex items-center justify-center rounded-xl bg-surface-container text-secondary group-hover:bg-primary-container group-hover:text-on-primary-container font-bold font-label transition-colors">A</span>
<span class="text-lg font-medium text-on-surface">Do kẹt xe</span>
</button>
<!-- Option B (Selected State Example) -->
<button class="group flex items-center gap-4 p-5 rounded-2xl bg-primary-fixed/50 border-2 border-primary text-left transition-all active:scale-[0.98] shadow-sm">
<span class="w-10 h-10 flex-shrink-0 flex items-center justify-center rounded-xl bg-primary text-on-primary font-bold font-label">B</span>
<span class="text-lg font-bold text-on-surface">Do tàu đến muộn</span>
<span class="material-symbols-outlined ml-auto text-primary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<!-- Option C -->
<button class="group flex items-center gap-4 p-5 rounded-2xl bg-surface-container-lowest border border-outline-variant/40 text-left hover:border-primary/50 hover:bg-primary-fixed/30 transition-all active:scale-[0.98]">
<span class="w-10 h-10 flex-shrink-0 flex items-center justify-center rounded-xl bg-surface-container text-secondary group-hover:bg-primary-container group-hover:text-on-primary-container font-bold font-label transition-colors">C</span>
<span class="text-lg font-medium text-on-surface">Do ngủ quên</span>
</button>
<!-- Option D -->
<button class="group flex items-center gap-4 p-5 rounded-2xl bg-surface-container-lowest border border-outline-variant/40 text-left hover:border-primary/50 hover:bg-primary-fixed/30 transition-all active:scale-[0.98]">
<span class="w-10 h-10 flex-shrink-0 flex items-center justify-center rounded-xl bg-surface-container text-secondary group-hover:bg-primary-container group-hover:text-on-primary-container font-bold font-label transition-colors">D</span>
<span class="text-lg font-medium text-on-surface">Do quên lịch hẹn</span>
</button>
</div>
</section>
</main>
<!-- Bottom Navigation (Fixed Action Area) -->
<footer class="fixed bottom-0 left-0 w-full bg-surface-bright/80 backdrop-blur-md border-t border-outline-variant/60 z-40 pb-safe">
<div class="max-w-2xl mx-auto px-6 py-4 flex items-center gap-4">
<button class="flex-1 bg-primary text-on-primary font-label font-bold text-base py-4 px-8 rounded-2xl shadow-lg shadow-primary/20 hover:opacity-90 active:scale-95 transition-all">
        Kiểm tra
      </button>
</div>
</footer>
<!-- Predicted BottomNavBar Component (Hidden on task-focused listening screen per UX rules, but rendered for structure reference if needed) -->
<nav class="hidden fixed bottom-0 w-full z-50 flex justify-around items-center px-8 py-4 bg-[#faf5ee] dark:bg-stone-950 border-t border-[#d8d0c8]/60 dark:border-stone-800 rounded-t-2xl">
<a class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-600 p-3 hover:opacity-80 transition-opacity" href="#">
<span class="material-symbols-outlined" data-icon="volume_up">volume_up</span>
</a>
<a class="flex flex-col items-center justify-center bg-orange-100 dark:bg-orange-900/30 text-[#c2652a] dark:text-orange-200 rounded-full p-3 transform scale-90 duration-150" href="#">
<span class="material-symbols-outlined" data-icon="keyboard_voice">keyboard_voice</span>
</a>
<a class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-600 p-3 hover:opacity-80 transition-opacity" href="#">
<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
</a>
</nav>
</body></html>
