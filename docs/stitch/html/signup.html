<body class="bg-background min-h-screen flex flex-col items-center selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- TopAppBar -->
<header class="docked full-width top-0 flex items-center justify-between px-6 py-4 w-full bg-[#faf5ee] dark:bg-stone-950">
<div class="flex items-center gap-4">
<button class="text-[#c2652a] dark:text-[#d4824d] hover:opacity-80 transition-opacity flex items-center justify-center p-2 rounded-full active:scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
</div>
<div class="font-serif text-2xl font-medium text-[#c2652a] dark:text-[#d4824d] italic">
            Sahara
        </div>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</header>
<main class="flex-1 w-full max-w-7xl px-6 py-12 flex items-center justify-center">
<!-- Auth Card Container -->
<div class="w-full max-w-md">
<!-- Branding/Decorative Element -->
<div class="flex justify-center mb-8">
<div class="w-16 h-16 rounded-full bg-primary-fixed flex items-center justify-center overflow-hidden">
<div class="w-full h-full bg-cover bg-center" data-alt="close-up of warm sand dunes at sunrise with soft golden light and intricate ripples in the sand" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCFScTg1LUMsCkVDY9v4EbuemHrCS22OuJsH4DwPu8tFv2Fzl5dUn7VFveQXbKPF06octquUv8dL0Z01q1afac1UUxKeokXZsYVPA0Pqv8ejnTXoL3gflOyX8mlMmd3mLTDCUYtO6mU--v2DJQFCfn6uo-1z7V_urdkmGWkJLTTx4g-Scm4EBWAbxEnFdgvaSU1Y-ilJ7XsVfoBFVfEnW1GDlQ4Ba47rl05iru1F02NBE69sY9ACTLYqJ4vVG7_QaBoKeaHdJ5KwL0')"></div>
</div>
</div>
<!-- Main Form Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 md:p-10 elevation-soft border border-outline-variant/60">
<div class="text-center mb-10">
<h1 class="font-serif italic text-4xl text-on-surface leading-tight mb-3">Tạo tài khoản</h1>
<p class="font-body text-secondary text-sm tracking-tight">Lưu kết quả thi và theo dõi lộ trình học của bạn.</p>
</div>
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-widest ml-1" for="email">Email</label>
<div class="relative">
<input class="w-full bg-white border border-outline-variant/60 rounded-lg px-4 py-3.5 text-on-surface placeholder:text-outline/50 focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all font-body text-sm" id="email" placeholder="example@domain.com" type="email"/>
<div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-outline/40">
<span class="material-symbols-outlined text-xl" data-icon="mail">mail</span>
</div>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-widest ml-1" for="password">Mật khẩu</label>
<div class="relative">
<input class="w-full bg-white border border-outline-variant/60 rounded-lg px-4 py-3.5 text-on-surface placeholder:text-outline/50 focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all font-body text-sm" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-3 flex items-center text-outline/60 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-3 px-1">
<input class="mt-1 rounded border-outline-variant text-primary focus:ring-primary cursor-pointer h-4 w-4" id="terms" type="checkbox"/>
<label class="text-xs text-secondary leading-relaxed font-body" for="terms">
                            Tôi đồng ý với <a class="text-primary hover:underline decoration-primary/30" href="#">Điều khoản dịch vụ</a> và <a class="text-primary hover:underline decoration-primary/30" href="#">Chính sách bảo mật</a>.
                        </label>
</div>
<!-- CTA Button -->
<button class="w-full bg-primary text-on-primary font-label font-semibold py-4 rounded-lg hover:opacity-90 active:scale-[0.98] transition-all shadow-sm flex items-center justify-center gap-2" type="submit">
                        Đăng ký ngay
                        <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/40"></div>
</div>
<div class="relative flex justify-center text-xs uppercase tracking-tighter">
<span class="bg-surface-container-lowest px-4 text-outline font-body">Hoặc đăng ký bằng</span>
</div>
</div>
<!-- Social Options -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 border border-outline-variant/60 rounded-lg py-3 hover:bg-surface-container transition-colors text-sm font-label text-on-surface">
<img alt="Google" class="w-4 h-4 opacity-70" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAWuTZvscEBlIaD7OcXYHLmn3ClhAlRUiDYArwhDCUq-CJzfdkfTpTTU_7NIq9U7fZTldipmOR0KZ7fbcZe3hi-_L9j2r-boEH9V8CsRtMY_hem70TqPbDB_zCuDbv3d5b3blgwVzGDI4R_NWofsKGgDV_zTVCgZRzMnwj0J3IJ1AnRVnlu6XH3jivDIgie0UktXiBQ0necyxgE9Q4_6TMe3vBdJ8t6h-hr4XxmzkVBYS7hLCQ4eaX7sGa2GLEvQTS5NXC2_SiZDlQ"/>
                        Google
                    </button>
<button class="flex items-center justify-center gap-2 border border-outline-variant/60 rounded-lg py-3 hover:bg-surface-container transition-colors text-sm font-label text-on-surface">
<span class="material-symbols-outlined text-lg text-secondary" data-icon="apple">ios</span>
                        Apple
                    </button>
</div>
</div>
<!-- Footer Link -->
<div class="mt-8 text-center">
<p class="font-body text-sm text-secondary">
                    Đã có tài khoản? 
                    <a class="text-primary font-bold ml-1 hover:underline decoration-primary/30 active:opacity-70 transition-all" href="#">Đăng nhập</a>
</p>
</div>
</div>
</main>
<!-- Decorative Bottom Detail -->
<footer class="w-full py-8 text-center text-outline/40 select-none overflow-hidden opacity-20 pointer-events-none">
<div class="font-serif italic text-8xl whitespace-nowrap">
            Trvalý Exam — Sahara — Minimalist Learning
        </div>
</footer>
