                    </p>
</div>
<form class="space-y-6">
<div class="space-y-1.5">
<label class="block text-xs font-label uppercase tracking-widest text-secondary ml-1" for="email">Email</label>
<input class="w-full px-4 py-3.5 bg-white border border-outline-variant rounded-lg focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all font-body text-on-surface placeholder:text-stone-300" id="email" name="email" placeholder="example@email.com" type="email"/>
</div>
<div class="space-y-1.5">
<div class="flex justify-between items-center px-1">
<label class="block text-xs font-label uppercase tracking-widest text-secondary" for="password">Mật khẩu</label>
<a class="text-xs font-body text-primary hover:underline underline-offset-4" href="#">Quên mật khẩu?</a>
</div>
<div class="relative">
<input class="w-full px-4 py-3.5 bg-white border border-outline-variant rounded-lg focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all font-body text-on-surface" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-stone-400 hover:text-secondary" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<div class="pt-2">
<button class="w-full bg-primary text-white font-body font-semibold py-4 rounded-lg hover:opacity-90 active:scale-[0.98] transition-all duration-150 shadow-sm shadow-primary/20" type="submit">
                            Đăng nhập
                        </button>
</div>
</form>
<div class="mt-12 text-center pt-8 border-t border-outline-variant/40">
<p class="text-sm text-secondary font-body">
                        Chưa có tài khoản? 
                        <a class="text-on-surface font-bold hover:text-primary transition-colors ml-1" href="#">Đăng ký</a>
</p>
</div>
</div>
<!-- Social Login Nudge (Optional Aesthetic Addition) -->
<div class="mt-8 flex items-center justify-center gap-6 opacity-60 grayscale hover:grayscale-0 transition-all duration-500">
